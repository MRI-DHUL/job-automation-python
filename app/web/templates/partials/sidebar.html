<aside class="sidebar">
  <div class="sidebar-header">Job Filters</div>

  <form method="POST" class="filter-form">
    <div class="field">
      <label>Provider</label>
      <select name="providers">
        <option value="">all</option>
        <option value="remoteok">RemoteOK</option>
        <option value="remotive">Remotive</option>
        <option value="arbeitnow">Arbeitnow</option>
      </select>
    </div>

    <div class="field">
      <label>Keywords (comma separated)</label>
      <input type="text" name="keywords" placeholder="react, python" />
    </div>

    <div class="field">
      <label>Locations</label>
      <select name="locations">
        <option value="">Choose options</option>
        <option value="remote">Remote</option>
        <option value="india">India</option>
        <option value="europe">Europe</option>
        <option value="usa">USA</option>
      </select>
    </div>

    <div class="field">
      <label>Job Type</label>
      <select name="job_types">
        <option value="">Choose options</option>
        <option value="full-time">Full Time</option>
        <option value="part-time">Part Time</option>
        <option value="contract">Contract</option>
      </select>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="remote_only" name="remote_only" />
      <label for="remote_only">Remote Only</label>
    </div>

    <div class="field">
      <label>Posted Within</label>
      <select name="posted_within">
        <option value="">Any</option>
        <option value="24h">Last 24 hours</option>
        <option value="7d">Last 7 days</option>
        <option value="30d">Last 30 days</option>
      </select>
    </div>

    <button type="submit" class="primary-btn">Search Jobs</button>
  </form>
</aside>
