<!doctype html>
<html>

<head>
    <title>Job Automation Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/logo.svg') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const form = document.querySelector("form");
        const loading = document.getElementById("loading");
        const results = document.getElementById("results-content");
        const statusText = document.getElementById("status-text");
        const idleMsg = document.getElementById("idle-msg");

        if (form) {
            form.addEventListener("submit", function () {
                if (loading) loading.classList.remove("hidden");

                if (statusText) statusText.textContent = "Connecting…";

                if (idleMsg) idleMsg.style.display = "none";

                if (results) results.style.display = "none";
            });
        }
    });
</script>

<body>
    <div class="app">
        {% include "partials/sidebar.html" %}

        <main class="content">
            {% include "partials/topbar.html" %} {% include "partials/results.html"
            %}
        </main>
    </div>
</body>

</html>
