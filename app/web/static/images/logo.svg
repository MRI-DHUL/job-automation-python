<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <!-- <rect width="64" height="64" rx="14" fill="#0f172a"/> -->

  <!-- Gradient circle -->
  <circle cx="32" cy="32" r="22" fill="url(#bg)"/>

  <!-- Automation nodes -->
  <circle cx="22" cy="32" r="4" fill="url(#fg)"/>
  <circle cx="42" cy="22" r="4" fill="url(#fg)"/>
  <circle cx="42" cy="42" r="4" fill="url(#fg)"/>

  <!-- Connecting lines -->
  <line x1="22" y1="32" x2="42" y2="22" stroke="url(#fg)" stroke-width="3" stroke-linecap="round"/>
  <line x1="22" y1="32" x2="42" y2="42" stroke="url(#fg)" stroke-width="3" stroke-linecap="round"/>
</svg>